name: Release

on:
  workflow_dispatch:
    inputs:
      publish_nuget:
        description: "Push packages to NuGet.org"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      sha: ${{ steps.resolve.outputs.sha }}
      publish_nuget: ${{ steps.flags.outputs.publish_nuget }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: resolve
        shell: bash
        run: |
          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          TAG_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          CURRENT_BRANCH="${{ github.ref_name }}"
          if [ "$CURRENT_BRANCH" != "$DEFAULT_BRANCH" ]; then
            echo "::error::Release is only allowed on default branch: $DEFAULT_BRANCH"
            exit 1
          fi

          VERSION=$(perl -0777 -ne 'if (m{<VersionPrefix>\s*([^<]+?)\s*</VersionPrefix>}s) { print $1 }' Directory.Build.props | head -n1 | xargs)
          if [ -z "$VERSION" ]; then
            echo "::error::VersionPrefix not found in Directory.Build.props"
            exit 1
          fi

          if ! [[ "$VERSION" =~ $SEMVER_REGEX ]]; then
            echo "::error::Invalid VersionPrefix in Directory.Build.props: $VERSION"
            exit 1
          fi

          TAG="v$VERSION"
          if ! [[ "$TAG" =~ $TAG_REGEX ]]; then
            echo "::error::Resolved tag format is invalid: $TAG"
            exit 1
          fi

          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag already exists locally: $TAG"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error::Tag already exists on remote: $TAG"
            exit 1
          fi

          SHA="$(git rev-parse HEAD)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG version=$VERSION sha=$SHA"

      - name: Resolve publish flags
        id: flags
        shell: bash
        run: |
          NUGET_KEY="${{ secrets.NUGET_API_KEY }}"
          INPUT_PUBLISH="${{ inputs.publish_nuget }}"

          if [ "$INPUT_PUBLISH" = "true" ] && [ -n "$NUGET_KEY" ]; then
            echo "publish_nuget=true" >> "$GITHUB_OUTPUT"
          else
            if [ "$INPUT_PUBLISH" = "true" ] && [ -z "$NUGET_KEY" ]; then
              echo "::warning::publish_nuget requested but NUGET_API_KEY secret is not configured. Skipping NuGet push."
            fi
            echo "publish_nuget=false" >> "$GITHUB_OUTPUT"
          fi

  build-test-pack:
    name: Build · Test · Pack
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tag: ${{ needs.resolve.outputs.tag }}
      version: ${{ needs.resolve.outputs.version }}
      sha: ${{ needs.resolve.outputs.sha }}
      publish_nuget: ${{ needs.resolve.outputs.publish_nuget }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.sha }}

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json', '.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build
        shell: bash
        run: |
          chmod +x build.sh
          ./build.sh Build

      - name: Test
        shell: bash
        run: ./build.sh Test --skip Build

      - name: Pack
        shell: bash
        run: ./build.sh Pack --skip Build Test

      - name: Validate package versions against tag
        shell: bash
        run: |
          EXPECTED_VERSION="${{ needs.resolve.outputs.version }}"

          shopt -s nullglob
          FILES=(artifacts/packages/*.nupkg artifacts/packages/*.snupkg)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No package files found under artifacts/packages/"
            exit 1
          fi

          for file in "${FILES[@]}"; do
            name="$(basename "$file")"
            if [[ "$name" != *".${EXPECTED_VERSION}.nupkg" && "$name" != *".${EXPECTED_VERSION}.snupkg" ]]; then
              echo "::error::Package version mismatch. Expected version $EXPECTED_VERSION, but got $name"
              exit 1
            fi
          done
          echo "All package files match expected version: $EXPECTED_VERSION"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ needs.resolve.outputs.tag }}
          path: artifacts/test-results/**
          if-no-files-found: warn

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ needs.resolve.outputs.tag }}
          path: artifacts/packages/**
          if-no-files-found: error

  release:
    name: Release
    needs: build-test-pack
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: release-tag-${{ needs.build-test-pack.outputs.tag }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.build-test-pack.outputs.sha }}
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        run: |
          TAG="${{ needs.build-test-pack.outputs.tag }}"
          SHA="${{ needs.build-test-pack.outputs.sha }}"

          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG was created by another run while this build was in progress"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG was pushed to remote by another run while this build was in progress"
            exit 1
          fi

          git tag "$TAG" "$SHA"
          git push origin "$TAG"
          echo "Created and pushed tag $TAG at $SHA"

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: packages
          pattern: packages-*
          merge-multiple: true

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.build-test-pack.outputs.tag }}"
          RELEASE_NAME="dotnet.CI.template $TAG"

          shopt -s nullglob
          FILES=(packages/*.nupkg packages/*.snupkg)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No release files found under packages/"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release already exists for tag $TAG"
            exit 1
          fi

          gh release create "$TAG" "${FILES[@]}" \
            --title "$RELEASE_NAME" \
            --generate-notes
          echo "Created release for $TAG"

  publish-nuget:
    name: Publish to NuGet
    needs: [build-test-pack, release]
    if: needs.build-test-pack.outputs.publish_nuget == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: packages
          pattern: packages-*
          merge-multiple: true

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Push to NuGet.org
        shell: bash
        run: |
          shopt -s nullglob
          PACKAGES=(packages/*.nupkg)
          if [ ${#PACKAGES[@]} -eq 0 ]; then
            echo "::error::No .nupkg files found"
            exit 1
          fi

          for pkg in "${PACKAGES[@]}"; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
          echo "All packages pushed to NuGet.org"
