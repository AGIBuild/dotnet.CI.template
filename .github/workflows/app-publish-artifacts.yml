name: App Publish Artifacts

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
        type: choice
        options:
          - Debug
          - Release
      run_tests:
        description: "Run tests before publish"
        required: true
        default: true
        type: boolean
      self_contained:
        description: "Publish self-contained artifacts"
        required: true
        default: false
        type: boolean
      runtimes:
        description: "Comma-separated RIDs"
        required: true
        default: "win-x64,linux-x64,osx-arm64"
        type: string

permissions:
  contents: read

concurrency:
  group: app-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      configuration: ${{ steps.prepare.outputs.configuration }}
      run_tests: ${{ steps.prepare.outputs.run_tests }}
      self_contained: ${{ steps.prepare.outputs.self_contained }}
      runtimes: ${{ steps.prepare.outputs.runtimes }}

    steps:
      - name: Resolve publish parameters
        id: prepare
        shell: pwsh
        run: |
          $configuration = "${{ inputs.configuration }}"
          $runTests = "${{ inputs.run_tests }}".ToLowerInvariant()
          $selfContained = "${{ inputs.self_contained }}".ToLowerInvariant()
          $runtimesInput = "${{ inputs.runtimes }}"

          $runtimes = $runtimesInput.Split(",") |
            ForEach-Object { $_.Trim() } |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Select-Object -Unique

          if ($runtimes.Count -eq 0) {
            throw "At least one runtime identifier is required."
          }

          $runtimeMatrix = @{
            include = @(
              $runtimes | ForEach-Object { @{ runtime = $_ } }
            )
          } | ConvertTo-Json -Compress

          "configuration=$configuration" >> $env:GITHUB_OUTPUT
          "run_tests=$runTests" >> $env:GITHUB_OUTPUT
          "self_contained=$selfContained" >> $env:GITHUB_OUTPUT
          "runtimes=$runtimeMatrix" >> $env:GITHUB_OUTPUT

  validate:
    name: Build and Test
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json', '.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build
        if: needs.prepare.outputs.run_tests != 'true'
        shell: bash
        run: |
          chmod +x build.sh
          ./build.sh Build \
            --Configuration "${{ needs.prepare.outputs.configuration }}"

      - name: Test
        if: needs.prepare.outputs.run_tests == 'true'
        shell: bash
        run: |
          chmod +x build.sh
          ./build.sh Test \
            --Configuration "${{ needs.prepare.outputs.configuration }}"

      - name: Upload test artifacts
        if: always() && needs.prepare.outputs.run_tests == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: artifacts/test-results/**
          if-no-files-found: warn

  publish:
    name: Publish (${{ matrix.runtime }})
    needs: [prepare, validate]
    runs-on: ${{ startsWith(matrix.runtime, 'win-') && 'windows-latest' || startsWith(matrix.runtime, 'osx-') && 'macos-latest' || 'ubuntu-latest' }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.runtimes) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json', '.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x build.sh
          ./build.sh Publish \
            --Configuration "${{ needs.prepare.outputs.configuration }}" \
            --Runtime "${{ matrix.runtime }}" \
            --SelfContained "${{ needs.prepare.outputs.self_contained }}"

      - name: Publish (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $configuration = "${{ needs.prepare.outputs.configuration }}"
          $runtime = "${{ matrix.runtime }}"
          $selfContained = "${{ needs.prepare.outputs.self_contained }}"

          ./build.ps1 Publish --Configuration "$configuration" --Runtime "$runtime" --SelfContained "$selfContained"

      - name: Upload publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-${{ matrix.runtime }}
          path: artifacts/publish/${{ matrix.runtime }}/**
          if-no-files-found: error
