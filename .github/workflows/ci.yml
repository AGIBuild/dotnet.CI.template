name: CI and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUKE_TELEMETRY_OPTOUT: true

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      sha: ${{ steps.resolve.outputs.sha }}
      is_release: ${{ steps.resolve.outputs.is_release }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version and context
        id: resolve
        shell: bash
        run: |
          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'

          VERSION=$(perl -0777 -ne 'if (m{<VersionPrefix>\s*([^<]+?)\s*</VersionPrefix>}s) { print $1 }' Directory.Build.props | head -n1 | xargs)
          if [ -z "$VERSION" ]; then
            echo "::error::VersionPrefix not found in Directory.Build.props"
            exit 1
          fi

          if ! [[ "$VERSION" =~ $SEMVER_REGEX ]]; then
            echo "::error::Invalid VersionPrefix: $VERSION"
            exit 1
          fi

          TAG="v$VERSION"
          SHA="$(git rev-parse HEAD)"

          IS_RELEASE="false"
          if [ "${{ github.event_name }}" != "pull_request" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            IS_RELEASE="true"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION tag=$TAG sha=$SHA is_release=$IS_RELEASE"

      - name: Compute build matrix
        id: matrix
        shell: bash
        run: |
          IS_RELEASE="${{ steps.resolve.outputs.is_release }}"
          if [ "$IS_RELEASE" = "true" ]; then
            MATRIX='{"include":[{"os":"ubuntu-latest","runtime":"linux-x64","pack":true},{"os":"windows-latest","runtime":"win-x64","pack":false},{"os":"macos-latest","runtime":"osx-arm64","pack":false}]}'
          else
            MATRIX='{"include":[{"os":"ubuntu-latest","runtime":"linux-x64","pack":false}]}'
          fi
          echo "build_matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  build-and-test:
    name: Build and Test (${{ matrix.runtime }})
    needs: resolve-version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-version.outputs.build_matrix) }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-version.outputs.sha }}

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json', '.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build and test
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x build.sh
          IS_RELEASE="${{ needs.resolve-version.outputs.is_release }}"
          if [ "$IS_RELEASE" = "true" ]; then
            ./build.sh Test
          else
            ./build.sh Test --VersionSuffix "ci.${{ github.run_number }}"
          fi

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $isRelease = "${{ needs.resolve-version.outputs.is_release }}"
          if ($isRelease -eq "true") {
            ./build.ps1 Test
          } else {
            ./build.ps1 Test --VersionSuffix "ci.${{ github.run_number }}"
          }

      - name: Pack and generate manifest
        if: needs.resolve-version.outputs.is_release == 'true' && matrix.pack
        shell: bash
        run: ./build.sh Pack GenerateReleaseManifest --skip Build Test

      - name: Validate package versions
        if: needs.resolve-version.outputs.is_release == 'true' && matrix.pack
        shell: bash
        run: |
          EXPECTED_VERSION="${{ needs.resolve-version.outputs.version }}"

          shopt -s nullglob
          FILES=(artifacts/packages/*.nupkg artifacts/packages/*.snupkg)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No package files found under artifacts/packages/"
            exit 1
          fi

          for file in "${FILES[@]}"; do
            name="$(basename "$file")"
            if [[ "$name" != *".${EXPECTED_VERSION}.nupkg" && "$name" != *".${EXPECTED_VERSION}.snupkg" ]]; then
              echo "::error::Package version mismatch. Expected $EXPECTED_VERSION, got $name"
              exit 1
            fi
          done
          echo "All packages match version: $EXPECTED_VERSION"

      - name: Publish app
        if: needs.resolve-version.outputs.is_release == 'true' && runner.os != 'Windows'
        shell: bash
        run: ./build.sh Publish --Runtime "${{ matrix.runtime }}"

      - name: Publish app (Windows)
        if: needs.resolve-version.outputs.is_release == 'true' && runner.os == 'Windows'
        shell: pwsh
        run: ./build.ps1 Publish --Runtime "${{ matrix.runtime }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.runtime }}
          path: artifacts/test-results/**
          if-no-files-found: warn

      - name: Upload packages
        if: needs.resolve-version.outputs.is_release == 'true' && matrix.pack
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: artifacts/packages/**
          if-no-files-found: error

      - name: Upload app artifacts
        if: needs.resolve-version.outputs.is_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: app-${{ matrix.runtime }}
          path: artifacts/publish/${{ matrix.runtime }}/**
          if-no-files-found: error

  release-packages:
    name: Release Packages
    needs: [resolve-version, build-and-test]
    if: needs.resolve-version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-version.outputs.sha }}
          sparse-checkout: global.json

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: packages

      - name: Verify release manifest
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${{ needs.resolve-version.outputs.version }}"
          MANIFEST="packages/release-manifest.json"

          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Release manifest not found: $MANIFEST"
            exit 1
          fi

          python3 - <<'PY'
          import hashlib, json, sys
          from pathlib import Path

          manifest = json.loads(Path("packages/release-manifest.json").read_text())
          expected = "${{ needs.resolve-version.outputs.version }}"

          if manifest.get("version") != expected:
              print(f"::error::Version mismatch: manifest={manifest.get('version')} expected={expected}")
              sys.exit(1)

          errors = []
          for pkg in manifest.get("packages", []):
              path = Path("packages") / pkg["file"]
              if not path.exists():
                  errors.append(f"Missing: {path}")
                  continue
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              if h.hexdigest() != pkg["sha256"]:
                  errors.append(f"Hash mismatch: {pkg['file']}")

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)

          print(f"Verified {len(manifest['packages'])} packages.")
          PY

      - name: Push to NuGet.org
        shell: bash
        run: |
          shopt -s nullglob
          PACKAGES=(packages/*.nupkg)
          if [ ${#PACKAGES[@]} -eq 0 ]; then
            echo "::error::No .nupkg files found"
            exit 1
          fi

          for pkg in "${PACKAGES[@]}"; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
          echo "All packages pushed to NuGet.org"

  deploy-docs:
    name: Deploy Documentation
    needs: [resolve-version, release-packages]
    if: needs.resolve-version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-version.outputs.sha }}

      - name: Check for DocFX configuration
        id: check-docs
        shell: bash
        run: |
          if [ -f "docs/docfx.json" ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No docs/docfx.json found. Skipping documentation deployment."
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-dotnet@v5
        if: steps.check-docs.outputs.has_docs == 'true'
        with:
          global-json-file: global.json

      - name: Restore .NET tools
        if: steps.check-docs.outputs.has_docs == 'true'
        run: dotnet tool restore

      - name: Build documentation
        if: steps.check-docs.outputs.has_docs == 'true'
        run: dotnet docfx docs/docfx.json

      - name: Upload pages artifact
        if: steps.check-docs.outputs.has_docs == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

      - name: Deploy to GitHub Pages
        if: steps.check-docs.outputs.has_docs == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

  create-release:
    name: Create Release
    needs: [resolve-version, build-and-test, release-packages, deploy-docs]
    if: |
      always() &&
      needs.release-packages.result == 'success' &&
      (needs.deploy-docs.result == 'success' || needs.deploy-docs.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    concurrency:
      group: release-tag-${{ needs.resolve-version.outputs.tag }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-version.outputs.sha }}
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          SHA="${{ needs.resolve-version.outputs.sha }}"

          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists locally"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG already exists on remote"
            exit 1
          fi

          git tag "$TAG" "$SHA"
          git push origin "$TAG"
          echo "Created and pushed tag $TAG at $SHA"

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: release-assets/packages

      - name: Download app artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets/apps
          pattern: app-*

      - name: Prepare release assets
        shell: bash
        run: |
          shopt -s nullglob
          mkdir -p release-assets/final

          for f in release-assets/packages/*.nupkg release-assets/packages/*.snupkg; do
            [ -f "$f" ] && cp "$f" release-assets/final/
          done

          for dir in release-assets/apps/app-*/; do
            if [ -d "$dir" ]; then
              runtime="$(basename "$dir")"
              (cd "$dir" && zip -r "../../final/${runtime}.zip" .)
              echo "Zipped $runtime"
            fi
          done

          echo "Release assets:"
          ls -la release-assets/final/

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          RELEASE_NAME="dotnet.CI.template $TAG"

          shopt -s nullglob
          RELEASE_FILES=(release-assets/final/*)
          if [ ${#RELEASE_FILES[@]} -eq 0 ]; then
            echo "::error::No release files found"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release already exists for tag $TAG"
            exit 1
          fi

          gh release create "$TAG" "${RELEASE_FILES[@]}" \
            --title "$RELEASE_NAME" \
            --generate-notes
          echo "Created release $TAG with ${#RELEASE_FILES[@]} assets"
